version: "3.8"

services:
  app:
    build: .
    container_name: nepal-sbom
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_PATH=/data/nepal_sbom.db
      - MAX_UPLOAD_SIZE_MB=50
      - UPLOAD_RATE_LIMIT=5
      # Required for production: SESSION_SECRET_KEY, ADMIN_PASSWORD (see .env.example)
      # Optional: GROQ_API_KEY, GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET, DEFAULT_GIT_BRANCH
    volumes:
      - sbom_data:/data
    networks:
      - sbom_net

  nginx:
    image: nginx:alpine
    container_name: nepal-sbom-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - sbom_net

volumes:
  sbom_data:

networks:
  sbom_net:
    driver: bridge
