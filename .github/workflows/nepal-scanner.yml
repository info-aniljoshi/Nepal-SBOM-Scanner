name: Nepal SBOM Scanner

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Nepal SBOM Scan
        env:
          SCANNER_URL: ${{ secrets.NEPAL_SCANNER_URL }}
          SCANNER_USER: ${{ secrets.NEPAL_SCANNER_USER }}
          SCANNER_PASS: ${{ secrets.NEPAL_SCANNER_PASS }}
        run: |
          python cli/ci_scan.py \
            --url "$SCANNER_URL" \
            --username "$SCANNER_USER" \
            --password "$SCANNER_PASS" \
            --fail-on high
